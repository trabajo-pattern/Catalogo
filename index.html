                const val = e.target.value.toLowerCase();
                val.length > 0 ? renderSuggestions(val) : suggestionsBox.classList.add('hidden');
            });
    
            function renderSuggestions(val) {
                const filtered = MOLDES_DB.filter(m => 
                    m.nombre.toLowerCase().includes(val) || m.categoria.toLowerCase().includes(val)
                );
    
                suggestionsBox.innerHTML = filtered.length > 0 ? filtered.map(m => `
                    <div class="flex items-center gap-4 p-4 hover:bg-slate-50 cursor-pointer border-b" onclick="showDetail(${m.id})">

                            <div class="text-[10px] text-slate-400 uppercase">${m.categoria}</div>
                        </div>
                    </div>
                `).join('') : '<div class="p-4 text-center text-slate-400">No hay resultados</div>';
                
                suggestionsBox.classList.remove('hidden');
                lucide.createIcons();
            }
    
            function showDetail(id) {
                const molde = MOLDES_DB.find(m => m.id === id);
                if (!molde) return;
    
                document.getElementById('nav-title').innerText = molde.nombre;
                document.getElementById('molde-name').innerText = molde.nombre;
                document.getElementById('molde-cat').innerText = molde.categoria;
                document.getElementById('molde-img-1').src = molde.imagen1;
                document.getElementById('sizes-table').innerHTML = molde.tallas.map(t => `
